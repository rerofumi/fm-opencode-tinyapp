[tools]
node = "lts"
go = "latest"

[tasks]
setup = { run = "go install github.com/wailsapp/wails/v2/cmd/wails@latest", description = "Install Wails CLI" }
generate = { run = "wails generate module", description = "Generate TypeScript bindings" }
dev = { run = "wails dev", description = "Run Wails in development mode" }
build = { run = "wails build", description = "Build the Wails application" }
build-serve = { run = "wails build && go build -o build/bin/fm-opencode-tinyapp-serve.exe .", description = "Build the Wails application and a console binary for --serve mode" }
